[tool.ruff]
src = ["."]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "S",   # flake8-bandit (security)
    "RUF", # ruff-specific
]
ignore = [
    "S101",  # assert statements (used in tests)
    "S105",  # hardcoded passwords (false positives in seed/test data)
    "B008",  # do not perform function calls in default arguments (FastAPI Depends pattern)
]

[tool.ruff.lint.per-file-ignores]
"seed.py" = ["S311"]   # random is fine for seed data
"tests/*" = ["S101"]   # asserts are expected in tests

[tool.mypy]
python_version = "3.11"
plugins = ["pydantic.mypy"]
explicit_package_bases = true
ignore_missing_imports = true
strict = false
disallow_untyped_defs = true
disallow_any_explicit = false
warn_return_any = false
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = ["celery.*", "passlib.*", "jose.*", "slowapi.*", "faker.*", "openpyxl.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "seed.py",
    "alembic/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "^\\.\\.\\.\\s*$",
]

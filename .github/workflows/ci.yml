name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — lint, type-check, test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        working-directory: backend
        run: python -m ruff check .

      - name: Type-check (mypy)
        working-directory: backend
        run: python -m mypy .

      - name: Test (pytest + coverage)
        working-directory: backend
        run: python -m pytest --cov=. --cov-report=term-missing --cov-report=xml --cov-config=pyproject.toml --cov-fail-under=80
        env:
          SECRET_KEY: ci-test-secret-key-not-used-in-prod
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: backend/coverage.xml
          badge: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: "50 80"

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

  frontend:
    name: Frontend — lint, type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint (eslint)
        working-directory: frontend
        run: npm run lint

      - name: Type-check (svelte-check)
        working-directory: frontend
        run: npm run check

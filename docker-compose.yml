services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: databridge
      POSTGRES_PASSWORD: databridge
      POSTGRES_DB: databridge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Postgres automatically runs any .sql files it finds here on first boot
      # of a fresh volume. This is how we create our schemas and tables.
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U databridge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      # SQLAlchemy connection string — driver://user:pass@host/dbname
      DATABASE_URL: postgresql://databridge:databridge@db/databridge
    volumes:
      # Mount source code so uvicorn --reload picks up changes without rebuild
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy  # wait for Postgres to be ready, not just started

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      # Prevent the host from overwriting the container's node_modules
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
